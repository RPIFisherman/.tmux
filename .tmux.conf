setw -g mode-keys vi

# moving between panes with vim movement keys
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

setw -g monitor-activity on
set -g visual-activity on

set -g history-limit 10000

# y and p as in vim
# Start selection with 'v' (visual mode)
bind-key -T copy-mode-vi v send-keys -X begin-selection

# Copy selection with 'y' (yank) and stay in copy mode
bind-key -T copy-mode-vi y send-keys -X copy-selection

# Copy selection with Enter and stay in copy mode
bind-key -T copy-mode-vi Enter send-keys -X copy-selection

# Keep mouse-based copy actions in copy mode too
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection
bind-key -T copy-mode-vi DoubleClick1Pane select-pane \; send-keys -X select-word \; run-shell -d 0.3 \; send-keys -X copy-selection
bind-key -T copy-mode-vi TripleClick1Pane select-pane \; send-keys -X select-line \; run-shell -d 0.3 \; send-keys -X copy-selection

# Optional: Paste with 'p'
bind-key p paste-buffer

# extra commands for interacting with the ICCCM clipboard
bind C-c run "tmux save-buffer - | xclip -i -sel clipboard"
bind C-v run "tmux set-buffer \"$(xclip -o -sel clipboard)\"; tmux paste-buffer"

# resize panes with vim movement keys
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# don't rename windows automatically
set -g allow-rename on

# moving between windows with vim movement keys
bind -r C-h select-window -t :-
bind -r C-l select-window -t :+

# Make window entries in the bottom status bar show alert flags clearly.
# # = activity in that window, ! = bell in that window.
set -g window-status-format '#[fg=colour15]#I:#W#F'
set -g window-status-current-format '#[bold fg=colour51]#I:#W#F'
set -g window-status-activity-style 'fg=colour226,bold'
set -g window-status-bell-style 'fg=colour196,bold'
set -g bell-action any
set -g status-interval 5
set -g status-right-length 240
set -g @agent_status_mode 'normal'
set -g @agent_status_done_ttl '180'
set -g status-right '#(~/.tmux-agent-status.sh --all --mode "#{@agent_status_mode}")'
bind-key M run-shell 'mode="$(tmux show-options -gqv @agent_status_mode 2>/dev/null || true)"; case "$mode" in brief) next=normal ;; normal) next=verbose ;; *) next=brief ;; esac; tmux set-option -gq @agent_status_mode "$next"; tmux display-message "Agent status mode: $next"'
unbind-key s
unbind-key w
unbind-key S
bind-key s display-popup -E -w 80% -h 80% ~/.tmux-agent-popup.sh
bind-key S choose-tree -Zs
bind-key w choose-tree -Zw

# Quick pane labeling for the agent dashboard.
bind-key A command-prompt -p 'Agent label' 'set -p @agent_label "%%"'
bind-key T command-prompt -p 'Pane title' 'select-pane -T "%%"'

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# Other examples:
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'github_username/plugin_name#branch'
# set -g @plugin 'git@github.com:user/plugin'
# set -g @plugin 'git@bitbucket.com:user/plugin'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Optional: Enable automatic restore on tmux server start
set -g @continuum-restore 'on'
set -g @resurrect-processes '"~nvim" ssh psql mysql bpytop "git log" "~openclaw"'

# Pane focus by mouse
set -g mouse on 

# Show pane index/title in the pane border, hide the border label when only one pane exists,
# and make the active pane stand out more clearly.
set -g pane-border-style "fg=colour51"
set -g pane-active-border-style "fg=colour46"
set -g pane-border-format '#{?pane_active,#[bold fg=colour46],#[fg=colour51]}#{pane_index} #{pane_title}#[default]'
set-hook -g window-layout-changed \
 'if-shell -F "#{==:#{window_panes},1}" \
 "set pane-border-status off" \
 "set pane-border-status top"'

# Disabled to avoid focus-triggered resize/layout jumps when the cursor enters a pane/window.
# set -g @plugin 'graemedavidson/tmux-focus-pane'
# Control how much the focused pane resizes
#set -g @pane-focus-size '50'        # focused pane takes 50% (default is usually larger)
#set -g @pane-focus-direction '|'    # or use '+' / '-' to control direction

# Use image.nvim
set -gq allow-passthrough on
set -g visual-activity off
set-option -g focus-events off

#Enable OSC 52 in tmux
set -g set-clipboard on
# Allow OSC 52 passthrough to the terminal
set -g allow-passthrough on

# Initialize TPM (must be at the end of the file)
run -b '~/.tmux/plugins/tpm/tpm'
